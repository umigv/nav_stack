vectornav_driver:
  ros__parameters:
    port: /dev/vn300

    # Acceptable baud rates: 9600 19200 38400 57600 115200 128000 230400 460800 921600
    baudRate: 230400

    # Output rate in Hz. Must be a valid divisor of the sensor sample rate
    # (800 Hz for VN-100/200, 400 Hz for VN-300)
    publishRate: 100

    # 3x3 row-major covariance matrix for linear acceleration (m/s^2)^2, in FLU body frame
    linearAccelCovariance: [0.01, 0.0,  0.0,
                            0.0,  0.01, 0.0,
                            0.0,  0.0,  0.01]

    # 3x3 row-major covariance matrix for angular velocity (rad/s)^2, in FLU body frame
    angularVelCovariance: [0.001, 0.0,   0.0,
                           0.0,   0.001, 0.0,
                           0.0,   0.0,   0.001]

    # (VN-200/300 only) Position of GNSS antenna A relative to the IMU, in FLU body frame (meters) [x, y, z]
    antennaAOffset: [0.021, -0.294481, 0.0]

    # (VN-300 only) Position of GNSS antenna B relative to antenna A, in FLU body frame (meters) [x, y, z]
    compassBaseline: [-0.518, 0.585, 0.0]

    # (VN-300 only) 1-sigma uncertainty of compassBaseline in each axis (meters) [x, y, z]
    compassBaselineU: [0.01295, 0.014625, 0.025]
