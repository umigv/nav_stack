sensor_simulator:
  ros__parameters:
    enc_vel:
      # ODrive S1 motor encoder, parking lot (minimal slip), 0.8-1.5 m/s
      vx_noise_std_mps: 0.01         # per-sample white noise on linear velocity
      wz_noise_std_radps: 0.01       # per-sample white noise on angular velocity
      vx_drift_std: 0.02             # ~2% scale factor drift (wheel radius calibration error)
      wz_drift_std: 0.02             # ~2% scale factor drift on angular velocity
      drift_time_constant_s: 60.0    # scale factor changes slowly (tire warmup, surface changes)

    vn300:
      # VectorNav VN-300 Rugged Dual GNSS/INS, open-sky parking lot. Values below feed the same error state on the
      # sim, so gps/raw, ins_vel/raw, imu/raw.orientation, and odom/global stay mutually consistent like the real
      # sensor's Kalman filter output.

      # Position (gps/raw, odom/global.pose.position)
      position_noise_std_m: 0.05     # per-fix white noise (GNSS-aided INS)
      position_drift_std_m: 0.5      # OU drift (multipath, ionospheric) - total RMS ~0.5 m
      position_drift_time_constant_s: 120.0

      # Body velocity (ins_vel/raw, odom/global.twist, imu/raw.angular_velocity)
      vx_noise_std_mps: 0.02
      wz_noise_std_radps: 0.005
      vx_drift_std_mps: 0.05
      wz_drift_std_radps: 0.002
      vel_drift_time_constant_s: 120.0

      # Yaw (imu/raw.orientation, odom/global.pose.orientation)
      yaw_noise_std_rad: 0.01        # ~0.5 deg, dual-antenna GNSS heading accuracy
      yaw_drift_std_rad: 0.005
      yaw_drift_time_constant_s: 300.0

    initial_yaw_rad: 0.0             # initial robot heading in true-north ENU (0 = facing east)
